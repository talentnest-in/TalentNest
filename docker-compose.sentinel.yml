services:
  redis-sentinel-1:
    image: redis:7-alpine
    container_name: talentnest-sentinel-1
    command: >
      redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./scripts/redis/sentinel1.conf:/etc/redis/sentinel.conf
    depends_on:
      - redis
    networks:
      - talentnest

  redis-sentinel-2:
    image: redis:7-alpine
    container_name: talentnest-sentinel-2
    command: >
      redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./scripts/redis/sentinel2.conf:/etc/redis/sentinel.conf
    depends_on:
      - redis
    networks:
      - talentnest

  redis-sentinel-3:
    image: redis:7-alpine
    container_name: talentnest-sentinel-3
    command: >
      redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./scripts/redis/sentinel3.conf:/etc/redis/sentinel.conf
    depends_on:
      - redis
    networks:
      - talentnest

  redis-replica-1:
    image: redis:7-alpine
    container_name: talentnest-redis-replica-1
    command: >
      redis-server --replicaof redis 6379
      --requirepass ${REDIS_PASSWORD:-talentnest}
      --masterauth ${REDIS_PASSWORD:-talentnest}
      --appendonly yes
    volumes:
      - redis-replica-data-1:/data
    depends_on:
      - redis
    networks:
      - talentnest

  redis-replica-2:
    image: redis:7-alpine
    container_name: talentnest-redis-replica-2
    command: >
      redis-server --replicaof redis 6379
      --requirepass ${REDIS_PASSWORD:-talentnest}
      --masterauth ${REDIS_PASSWORD:-talentnest}
      --appendonly yes
    volumes:
      - redis-replica-data-2:/data
    depends_on:
      - redis
    networks:
      - talentnest

volumes:
  redis-replica-data-1:
  redis-replica-data-2:
