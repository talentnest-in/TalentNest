# ──────────────────────────────────────────────────────────────────
# WAF Rules — SQL Injection, XSS, Path Traversal, Command Injection
# These map directives must be placed in the http block.
# ──────────────────────────────────────────────────────────────────

# SQL Injection patterns
map $request_uri $sql_injection {
    default                                             0;
    "~*(?i)(union.*select|select.*from|insert.*into|delete.*from|drop\s+table|alter\s+table|createmethod\s+table|exec\s*\(|execute\s*\(|xp_cmdshell|sp_executesql|sqlite_master|information_schema)" 1;
    "~*(?i)(%27|%22|--|;|/\*|\*/|@@|char\s*\(|nchar\s*\()"  1;
    "~*(?i)('|\")\s*(or|and)\s+('|\")\s*=\s*('|\")"          1;
    "~*(?i)(sleep\s*\(|benchmark\s*\()"                       1;
}

# XSS patterns
map $request_uri $xss_attack {
    default                                             0;
    "~*(?i)(<script|</script|javascript:|onerror=|onload=|onclick=|onmouseover=|alert\s*\()" 1;
    "~*(?i)(%3Cscript|%3C/script|%22%3E%3Cscript)"          1;
    "~*(?i)(document\.cookie|document\.location|window\.location|eval\s*\()" 1;
}

# Path traversal patterns
map $request_uri $path_traversal {
    default                                             0;
    "~*(\.\./|\.\.%2f|%2e%2e%2f|%2e%2e/|\.\.\\)"            1;
    "~*(/etc/passwd|/etc/shadow|/windows/system32|/\.git/config)" 1;
}

# Command injection patterns
map $request_uri $cmd_injection {
    default                                             0;
    "~*(?i)(;\s*(ls|cat|rm|wget|curl|bash|sh|cmd|powershell))" 1;
    "~*(?i)(\|\s*(ls|cat|rm|wget|curl|bash|sh|cmd))"         1;
    "~*(?i)(`ls|`cat|`rm|`wget|`curl|`id)"                    1;
    "~*(?i)(\$\s*\(|%60|%24%28)"                             1;
}
