upstream backend {
    ip_hash;
    server backend:3001;
}

# ── WAF Rules ─────────────────────────────────────────────────────
include /etc/nginx/waf-rules.conf;

# ── Rate Limiting Zones ────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=auth_api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=general_api:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=static:10m rate=500r/m;

limit_req_status 429;
limit_req_log_level warn;

# ═══════════════════════════════════════════════════════════════════
# DEV SERVER — HTTP (default)
# ═══════════════════════════════════════════════════════════════════
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ACME challenge (always available for certbot in production)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── WAF Enforcement ──────────────────────────────────────────
    if ($sql_injection)  { return 403; }
    if ($xss_attack)     { return 403; }
    if ($path_traversal) { return 403; }
    if ($cmd_injection)  { return 403; }

    # ── Security Headers ──────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip Compression ─────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-font-ttf
        image/svg+xml
        image/x-icon;

    # ── Client Settings ──────────────────────────────────────────
    client_max_body_size 100M;
    client_body_timeout 60s;
    client_header_timeout 30s;
    keepalive_timeout 65;
    send_timeout 60s;
    proxy_connect_timeout 30s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # ── Proxy Headers ────────────────────────────────────────────
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Auth Endpoints (strict rate limit) ─────────────────────────
    location ~* ^/api/v1/auth/(login|register)$ {
        limit_req zone=login burst=3 delay=2;
        proxy_pass http://backend$request_uri;
        proxy_buffering off;
        proxy_cache off;
    }

    location /api/v1/auth/ {
        limit_req zone=auth_api burst=5 delay=3;
        proxy_pass http://backend/api/v1/auth/;
        proxy_buffering off;
        proxy_cache off;
    }

    # ── API Reverse Proxy ──────────────────────────────────────────
    location /api/ {
        limit_req zone=general_api burst=20 delay=5;
        proxy_pass http://backend/api/;
        proxy_buffering off;
        proxy_cache off;
    }

    # ── Health Check ──────────────────────────────────────────────
    location /health {
        limit_req zone=general_api burst=5;
        proxy_pass http://backend/health;
        proxy_buffering off;
        proxy_cache off;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ── Public Files ───────────────────────────────────────────────
    location /public/ {
        limit_req zone=static burst=50;
        proxy_pass http://backend/public/;
        proxy_buffering off;
        proxy_cache off;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── WebSocket Proxy (Socket.IO) ───────────────────────────────
    location /socket.io/ {
        proxy_pass http://backend/socket.io/;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Frontend Static Assets ────────────────────────────────────
    location /assets/ {
        limit_req zone=static burst=100;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /favicon.ico {
        limit_req zone=static burst=50;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /robots.txt {
        limit_req zone=static burst=50;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA Fallback ──────────────────────────────────────────────
    location / {
        limit_req zone=static burst=100 delay=10;
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
}

# ═══════════════════════════════════════════════════════════════════
# SSL AUTO-RENEWAL SCRIPT (certbot)
# ═══════════════════════════════════════════════════════════════════
# Add to crontab or run daily:
#   docker compose --profile certbot run certbot renew
#
# For Docker-based renewal, uncomment the "Command" section
# in docker-compose.yml for certbot service, or run:
#   docker compose run certbot renew
